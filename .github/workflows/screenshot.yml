name: Update Perfect Games Screenshot

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Install CaesiumCLT
        run: |
          curl -sL "https://github.com/Lymphatus/caesium-clt/releases/download/v1.3.0/caesiumclt-v1.3.0-x86_64-unknown-linux-musl.tar.gz" -o /tmp/caesiumclt.tar.gz
          tar xzf /tmp/caesiumclt.tar.gz -C /tmp
          cp /tmp/caesiumclt-*/caesiumclt /usr/local/bin/
          chmod +x /usr/local/bin/caesiumclt

      - name: Generate screenshot
        run: python scripts/perfect-games-screenshot.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update perfect games screenshot"
          file_pattern: assets/perfect-games.png
